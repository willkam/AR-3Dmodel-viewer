<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR 查看器</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./ar.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <header class="top">
      <a class="btn back" href="./">返回</a>
      <div class="title">AR 查看器</div>
      <div class="top-actions">
        <button id="shareModelBtn" class="btn btn-small" type="button" disabled>分享模型</button>
        <button id="sharePageBtn" class="btn btn-small" type="button">分享页面</button>
      </div>
    </header>

    <main class="main">
      <div id="status" class="status">正在加载模型...</div>

      <model-viewer
        id="mv"
        class="viewer"
        loading="eager"
        reveal="auto"
        camera-controls
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        shadow-intensity="0.6"
        exposure="1"
        environment-image="neutral"
        alt="三维模型"
      >
        <button slot="ar-button" class="arbtn">进入 AR</button>
      </model-viewer>

      <section class="help">
        <div class="help-title">使用说明</div>
        <div class="help-text">点击 <span class="kbd">进入 AR</span>，移动手机检测平面，点击放置模型；可通过手势移动、旋转、缩放。</div>
        <div id="iosHint" class="help-text hidden">如果在微信/QQ 内置浏览器打开，请切换到 Safari，以获得更好的 iOS AR 兼容性。</div>
        <div id="usdzRow" class="usdz hidden">
          <a id="usdzLink" class="btn" href="#" rel="ar">打开 USDZ</a>
          <span class="help-text">如果打开失败，可能是 USDZ 文件不兼容，或服务端响应头/权限配置不正确。</span>
        </div>
      </section>
    </main>

    <script type="module" src="./ar.js"></script>
  </body>
</html>
