<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View in AR</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./ar.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <header class="top">
      <div class="title">AR Viewer</div>
      <a class="btn" href="./">Back</a>
    </header>

    <main class="main">
      <div id="status" class="status">Loading model...</div>

      <model-viewer
        id="mv"
        class="viewer"
        loading="eager"
        reveal="auto"
        camera-controls
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        shadow-intensity="0.6"
        exposure="1"
        environment-image="neutral"
        alt="3D model"
      >
        <button slot="ar-button" class="arbtn">Enter AR</button>
      </model-viewer>

      <section class="help">
        <div class="help-title">How to use</div>
        <div class="help-text">Tap <span class="kbd">Enter AR</span>, then move your phone to detect a plane. Tap to place the model. Use gestures to move/rotate/scale.</div>
      </section>
    </main>

    <script type="module" src="./ar.js"></script>
  </body>
</html>
