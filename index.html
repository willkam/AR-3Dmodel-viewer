<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三维模型预览</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/",
          "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/+esm",
          "qrcode": "https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">三维模型预览</div>
            <div class="brand-sub">材质渲染与轨道查看</div>
          </div>
        </div>
        <div class="top-actions">
          <label class="btn btn-upload file-btn">
            <input id="fileInput" type="file" accept=".glb,.gltf,.fbx,.usdz" multiple />
            上传模型
          </label>
          <span class="upload-hint">
            <span class="hint-info">提示：可将文件夹拖到预览区导入多文件。</span>
            <span class="hint-warn">AR 要求：Android WebXR 使用 GLB；iOS AR 最佳为 USDZ。</span>
          </span>
          <button id="shareArBtn" class="btn">AR 查看</button>
          <button id="descToggle" class="btn">说明</button>
        </div>
      </header>

      <main class="layout">
        <section class="viewer">
          <canvas id="sceneCanvas"></canvas>
          <div id="viewerMsg" class="viewer-msg hidden"></div>
          <div class="side-controls">
            <button id="autoRotateBtn" class="btn btn-secondary">自动旋转</button>
            <button id="fitBtn" class="btn btn-secondary">重置视图</button>
            <button id="yAxisBtn" class="btn btn-secondary">修正 Y+</button>
            <div class="side-block">
              <div class="side-label">背景</div>
              <div class="side-chips" id="bgMode">
                <button class="chip chip-light" data-bg="default">默认</button>
                <button class="chip chip-light" data-bg="light">浅灰</button>
                <button class="chip chip-light" data-bg="dark">深灰</button>
                <button class="chip chip-light" data-bg="gradient">渐变灰</button>
              </div>
            </div>
            <div class="side-block">
              <button id="envToggleBtn" class="btn btn-secondary">环境光：开</button>
              <div class="side-slider">
                <div class="side-label">
                  灯光强度
                  <span id="lightIntensityValue" class="side-value">1.00</span>
                </div>
                <input id="lightIntensity" type="range" min="0" max="2" step="0.05" value="1" />
              </div>
              <div class="side-slider">
                <div class="side-label">
                  色温（K）
                  <span id="lightTempValue" class="side-value">6500</span>
                </div>
                <input id="lightTemp" type="range" min="2500" max="10000" step="100" value="6500" />
              </div>
            </div>
          </div>
          <div class="hud">
            <div class="hud-group">
              <span class="hud-label">视角</span>
              <button data-view="perspective" class="chip active">透视</button>
              <button data-view="front" class="chip">前</button>
              <button data-view="back" class="chip">后</button>
              <button data-view="left" class="chip">左</button>
              <button data-view="right" class="chip">右</button>
              <button data-view="top" class="chip">上</button>
              <button data-view="bottom" class="chip">下</button>
            </div>
            <div class="hud-group">
              <span class="hud-label">材质</span>
              <label class="switch">
                <input id="materialToggle" type="checkbox" checked />
                <span class="slider"></span>
              </label>
              <span class="switch-label">开</span>
            </div>
            <div class="hud-group">
              <span class="hud-label">线框</span>
              <label class="switch">
                <input id="wireToggle" type="checkbox" />
                <span class="slider"></span>
              </label>
              <span class="switch-label">关</span>
            </div>
          </div>
          <div id="dropHint" class="drop-hint">将 GLB/GLTF/FBX/USDZ（及贴图）拖拽到此处</div>
        </section>

        <aside id="descPanel" class="panel hidden">
          <div class="panel-header">
            <div class="panel-title">模型说明</div>
            <button id="descClose" class="btn btn-ghost">关闭</button>
          </div>
          <textarea id="descText" placeholder="填写模型说明、材质信息或使用备注。"></textarea>
          <div class="panel-footer">
            <button id="descSave" class="btn">保存</button>
            <span id="descSaved" class="status">已保存</span>
          </div>
        </aside>
      </main>

      <div id="arModal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close="1"></div>
        <div class="modal-card" role="dialog" aria-modal="true" aria-label="View in AR">
          <div class="modal-head">
            <div class="modal-title">AR 查看</div>
            <button id="arCloseBtn" class="btn btn-ghost">关闭</button>
          </div>

          <div class="modal-body">
            <div class="field">
              <label class="field-label" for="sbUrlInput">Supabase 项目 URL</label>
              <input id="sbUrlInput" class="field-input" placeholder="https://xxxx.supabase.co" />
              <div class="field-help">本地保存，用于上传并从 Storage 提供文件。</div>
            </div>

            <div class="field">
              <label class="field-label" for="sbKeyInput">Supabase 公钥（Publishable Key）</label>
              <input id="sbKeyInput" class="field-input" placeholder="sb_publishable_..." />
              <div class="field-help">使用 Publishable Key，不要使用 Secret Key。</div>
            </div>

            <div class="field">
              <div class="field-label">当前上传</div>
              <div id="arFilesLabel" class="field-help hint-info">尚未上传模型。</div>
              <div id="arCompatHint" class="field-help hint-warn"></div>
            </div>

            <div class="field">
              <button id="uploadArBtn" class="btn">上传模型并生成 AR 二维码</button>
              <div id="arStatus" class="field-help hint-info"></div>
            </div>

            <div id="arResult" class="ar-result hidden">
              <img id="arQrImg" class="qr" alt="QR code" />
              <div class="ar-link">
                <input id="arLinkInput" class="field-input" readonly />
                <button id="copyArLinkBtn" class="btn btn-ghost">复制</button>
              </div>
              <div id="arScanHint" class="field-help hint-info"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
